[pytest]
# Host-side Python tests for esp32-bpm-detector.
# These tests exercise the protocol serialization (FlatBuffers Python bindings)
# and a Python reference implementation of the BPM-from-envelope algorithm
# so that the core logic can be validated without embedded hardware.

minversion = 8.0

testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

markers =
    hardware: tests that require a connected ESP32 device
    slow: tests that take > 5 seconds

addopts =
    -ra
    --tb=short
    --ignore=tests/integration

[coverage:run]
source = android-app/app/src/main/python/sparetools
branch = true
omit =
    */tests/*
    */flatbuffers*

[coverage:report]
precision = 2
show_missing = True
